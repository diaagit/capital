services:
  postgres:
    image: postgres:16.3
    restart: unless-stopped
    environment:
      POSTGRES_PASSWORD: mysecretpassword
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - monitoring

  redis:
    image: redis/redis-stack:latest
    restart: unless-stopped
    ports:
      - "6379:6379"
      - "8001:8001"
    volumes:
      - redisdata:/data
    networks:
      - monitoring

  prometheus:
    image: prom/prometheus:v2.48.0
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    networks:
      - monitoring

  grafana:
    image: grafana/grafana:10.4.3
    restart: unless-stopped
    ports:
      - "3005:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GF_SECURITY_ADMIN_PASSWORD}
    depends_on:
      - prometheus
    networks:
      - monitoring

  node-exporter:
    image: prom/node-exporter:latest
    restart: unless-stopped
    ports:
      - "9100:9100"
    networks:
      - monitoring

  backend:
    image: ronakmaheshwari077/capital-http:latest
    restart: unless-stopped
    ports:
      - "3001:3001"
    env_file:
      - ./apps/http/.env
    environment:
      DATABASE_URL: postgresql://postgres:mysecretpassword@postgres:5432/postgres
      REDIS_URL: redis://redis:6379
    depends_on:
      - postgres
      - redis
      - prometheus
    networks:
      - monitoring

  validator:
    image: ronakmaheshwari077/capital-validator:latest
    restart: unless-stopped
    ports:
      - "3003:3003"
    env_file:
      - ./apps/validator/.env
    environment:
      DATABASE_URL: postgresql://postgres:mysecretpassword@postgres:5432/postgres
      REDIS_URL: redis://redis:6379
    depends_on:
      - postgres
      - redis
      - prometheus
    networks:
      - monitoring

  frontend:
    image: ronakmaheshwari077/capital-frontend:latest
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://postgres:mysecretpassword@postgres:5432/postgres
    depends_on:
      - postgres
      - redis
      - prometheus
    networks:
      - monitoring

  webhook:
    image: ronakmaheshwari077/capital-webhook:latest
    restart: unless-stopped
    ports:
      - "3002:3002"
    environment:
      DATABASE_URL: postgresql://postgres:mysecretpassword@postgres:5432/postgres
      REDIS_URL: redis://redis:6379
    depends_on:
      - postgres
      - redis
      - prometheus
    networks:
      - monitoring

  react-validator:
    image: ronakmaheshwari077/capital-frontend-validator:latest
    restart: unless-stopped
    ports:
      - "8080:80"
    depends_on:
      - postgres
      - redis
      - prometheus
    networks:
      - monitoring

  react-webhook:
    image: ronakmaheshwari077/capital-frontend-webhook:latest
    restart: unless-stopped
    ports:
      - "8081:80"
    depends_on:
      - postgres
      - redis
      - prometheus
    networks:
      - monitoring

  http-workers:
    image: ronakmaheshwari077/capital-http:latest
    restart: unless-stopped
    command: ["npm", "run", "start:worker"]
    env_file:
      - ./apps/http/.env
    environment:
      DATABASE_URL: postgresql://postgres:mysecretpassword@postgres:5432/postgres
      REDIS_URL: redis://redis:6379
    depends_on:
      - postgres
      - redis
    networks:
      - monitoring

  transaction-workers:
    image: ronakmaheshwari077/capital-webhook:latest
    restart: unless-stopped
    command: ["npm", "run", "start:tworker"]
    env_file:
      - ./apps/webhook/.env
    environment:
      DATABASE_URL: postgresql://postgres:mysecretpassword@postgres:5432/postgres
      REDIS_URL: redis://redis:6379
    depends_on:
      - postgres
      - redis
    networks:
      - monitoring

volumes:
  pgdata:
  redisdata:
  prometheus_data:

networks:
  monitoring:
    driver: bridge